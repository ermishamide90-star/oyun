<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎮 TikTok Oyunu - Engelleri Kaçın!</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }
        #gameContainer {
            position: relative;
            width: 100vw;
            height: 100vh;
        }
        canvas {
            display: block;
            background: #1a1a2e;
        }
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        #score, #lives, #level {
            position: absolute;
            font-size: 24px;
            font-weight: bold;
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            font-family: 'Courier New', monospace;
        }
        #score {
            top: 20px;
            left: 20px;
        }
        #lives {
            top: 20px;
            right: 20px;
        }
        #level {
            top: 60px;
            left: 20px;
        }
        #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1000;
        }
        #gameOverScreen.show {
            display: flex;
        }
        .gameOverContent {
            text-align: center;
            color: white;
        }
        .gameOverContent h1 {
            font-size: 60px;
            margin-bottom: 20px;
            color: #ff6b6b;
            text-shadow: 0 0 20px rgba(255, 107, 107, 0.8);
        }
        .gameOverContent p {
            font-size: 30px;
            margin: 20px 0;
        }
        .gameOverContent .score {
            font-size: 40px;
            color: #00ff00;
            margin: 30px 0;
        }
        .gameOverContent button {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 30px;
            transition: 0.3s;
        }
        .gameOverContent button:hover {
            background: #ff5252;
            transform: scale(1.1);
        }
        #startScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }
        #startScreen.hide {
            display: none;
        }
        .startContent {
            text-align: center;
            color: white;
        }
        .startContent h1 {
            font-size: 50px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
        .startContent .info {
            font-size: 18px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px 20px;
            border-radius: 10px;
        }
        .startContent button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 15px 50px;
            font-size: 24px;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 40px;
            font-weight: bold;
            transition: 0.3s;
        }
        .startContent button:hover {
            background: #00dd00;
            transform: scale(1.1);
        }
        .controls {
            margin-top: 30px;
            font-size: 16px;
            background: rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <div id="startScreen">
            <div class="startContent">
                <h1>🎮 TikTok Oyunu</h1>
                <div class="info">🟢 Yeşil Küpü Kontrol Et</div>
                <div class="info">💥 Renkli Engelleri Kaçın</div>
                <div class="info">⭐ Puan Topla (10 puan/engel)</div>
                <div class="info">❤️ 3 Can - Çarpışırsan kaybet!</div>
                <div class="controls">
                    <div>⌨️ <strong>Klavye:</strong> A/D veya ← →</div>
                    <div>📱 <strong>Mobil:</strong> Ekranda kaydır</div>
                </div>
                <button onclick="startGame()">🚀 OYUNU BAŞLAT</button>
            </div>
        </div>

        <canvas id="gameCanvas"></canvas>
        
        <div id="ui">
            <div id="score">Puan: 0</div>
            <div id="lives">Can: ❤️❤️❤️</div>
            <div id="level">Seviye: 1</div>
        </div>

        <div id="gameOverScreen">
            <div class="gameOverContent">
                <h1>OYUN BİTTİ!</h1>
                <p>Tebrikler! 🎉</p>
                <div class="score" id="finalScore">Puan: 0</div>
                <button onclick="location.reload()">🔄 YENİDEN BAŞLA</button>
            </div>
        </div>
    </div>

    <script async src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // Oyun Değişkenleri
        let scene, camera, renderer;
        let player;
        let obstacles = [];
        let score = 0;
        let lives = 3;
        let gameRunning = false;
        let spawnRate = 80;
        let spawnCounter = 0;
        const colors = [0xff3333, 0xffaa00, 0xff6bb6, 0xff00ff];

        // Kontroller
        const keys = {};
        let touchStartX = 0;

        window.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
        });

        window.addEventListener('touchmove', (e) => {
            if (!gameRunning) return;
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            
            if (diff > 30) {
                player.position.x = Math.min(player.position.x + 0.15, 2.5);
                touchStartX = touchX;
            } else if (diff < -30) {
                player.position.x = Math.max(player.position.x - 0.15, -2.5);
                touchStartX = touchX;
            }
        });

        function initScene() {
            // Scene
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFShadowShadowMap;
            renderer.setPixelRatio(window.devicePixelRatio);
            
            const canvas = document.getElementById('gameCanvas');
            if (canvas) canvas.parentNode.removeChild(canvas);
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            // Işık
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
            directionalLight.position.set(5, 10, 7);
            directionalLight.castShadow = true;
            directionalLight.shadow.mapSize.width = 2048;
            directionalLight.shadow.mapSize.height = 2048;
            scene.add(directionalLight);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            // Oyuncu
            const playerGeometry = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const playerMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x00ff00,
                shininess: 100
            });
            player = new THREE.Mesh(playerGeometry, playerMaterial);
            player.castShadow = true;
            player.receiveShadow = true;
            player.position.y = -3;
            scene.add(player);

            // Zemin
            const groundGeometry = new THREE.PlaneGeometry(10, 0.1);
            const groundMaterial = new THREE.MeshPhongMaterial({ color: 0x333333 });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.receiveShadow = true;
            ground.position.y = -3.5;
            scene.add(ground);

            // Pencere yeniden boyutlandırması
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }

        function createObstacle() {
            const randomColor = colors[Math.floor(Math.random() * colors.length)];
            
            const geometry = new THREE.BoxGeometry(1, 0.5, 0.5);
            const material = new THREE.MeshPhongMaterial({ 
                color: randomColor,
                shininess: 100
            });
            const obstacle = new THREE.Mesh(geometry, material);
            obstacle.castShadow = true;
            obstacle.receiveShadow = true;

            obstacle.position.x = (Math.random() - 0.5) * 4;
            obstacle.position.y = 5;
            obstacle.position.z = 0;
            
            const level = Math.floor(score / 200) + 1;
            obstacle.velocity = 0.02 + (level - 1) * 0.005;
            obstacle.passed = false;

            scene.add(obstacle);
            obstacles.push(obstacle);
        }

        function updateUI() {
            document.getElementById('score').textContent = `Puan: ${score}`;
            
            const level = Math.floor(score / 200) + 1;
            document.getElementById('level').textContent = `Seviye: ${level}`;
            
            const heartMap = {3: '❤️❤️❤️', 2: '❤️❤️', 1: '❤️', 0: ''};
            document.getElementById('lives').textContent = `Can: ${heartMap[lives]}`;
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = `Puan: ${score}`;
            document.getElementById('gameOverScreen').classList.add('show');
        }

        function startGame() {
            document.getElementById('startScreen').classList.add('hide');
            gameRunning = true;
            score = 0;
            lives = 3;
            spawnRate = 80;
            obstacles = [];
            
            // Sahnedeki tüm engelleri temizle
            for (let i = obstacles.length - 1; i >= 0; i--) {
                scene.remove(obstacles[i]);
            }
            obstacles = [];
            
            // İlk engeli oluştur
            createObstacle();
            updateUI();
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);

            if (gameRunning) {
                // Oyuncu hareketi
                if (keys['a'] || keys['arrowleft']) {
                    player.position.x -= 0.12;
                }
                if (keys['d'] || keys['arrowright']) {
                    player.position.x += 0.12;
                }

                player.position.x = Math.max(-2.5, Math.min(2.5, player.position.x));

                // Engelleri güncelle
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    obstacles[i].position.y -= obstacles[i].velocity;
                    obstacles[i].rotation.z += 0.02;

                    // Çarpışma kontrolü
                    const dx = Math.abs(obstacles[i].position.x - player.position.x);
                    const dy = Math.abs(obstacles[i].position.y - player.position.y);

                    if (dx < 0.6 && dy < 0.6) {
                        lives--;
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                        updateUI();

                        if (lives <= 0) {
                            gameOver();
                        }
                        continue;
                    }

                    // Puan
                    if (obstacles[i].position.y < player.position.y && !obstacles[i].passed) {
                        score += 10;
                        obstacles[i].passed = true;
                        updateUI();
                    }

                    // Sahne dışına çıktı
                    if (obstacles[i].position.y < -6) {
                        scene.remove(obstacles[i]);
                        obstacles.splice(i, 1);
                    }
                }

                // Engel oluştur
                spawnCounter++;
                const level = Math.floor(score / 200) + 1;
                spawnRate = Math.max(30, 80 - (level - 1) * 10);

                if (spawnCounter > spawnRate) {
                    createObstacle();
                    spawnCounter = 0;
                }
            }

            renderer.render(scene, camera);
        }

        // Başlat
        initScene();
    </script>
</body>
</html>
